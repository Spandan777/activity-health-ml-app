<!DOCTYPE html>
<html>

<head>
<title>Activity Health Score</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Poppins', sans-serif;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;

background: linear-gradient(135deg,#ff9ccf,#ffffff,#7ee7ff);
}

.container{
background:white;
padding:35px;
width:420px;
border-radius:20px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:5px;
}

.subtitle{
color:#555;
margin-bottom:25px;
font-size:14px;
}

input, select{
width:90%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:15px;
padding:12px;
width:95%;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
background:linear-gradient(90deg,#ff7eb3,#6be7ff);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:20px;
padding:15px;
border-radius:12px;
background:#f5f5f5;
}

.gradeA{color:green;font-weight:600;}
.gradeB{color:#2c8f2c;font-weight:600;}
.gradeC{color:#ff9900;font-weight:600;}
.gradeD{color:red;font-weight:600;}

</style>

</head>

<body>

<div class="container">

<h1>Activity Health Checker</h1>
<p class="subtitle">Let's find out how lazy you are!!</p>

<form action="/predict" method="post">

<input type="number" name="age" placeholder="Age" required>

<select name="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<input type="number" name="walking" placeholder="Walking minutes">

<input type="number" name="running" placeholder="Running minutes">

<input type="number" name="standing" placeholder="Standing minutes">

<input type="number" name="sitting" placeholder="Sitting minutes">

<input type="number" name="sleeping" placeholder="Sleeping minutes">

<button type="submit">Calculate Activity Score</button>

</form>

{% if score %}

<div class="result">

<h3>Activity Score: {{score}}</h3>

<h3 class="grade{{grade}}">Grade: {{grade}}</h3>

<p>{{recommendation}}</p>

</div>

{% endif %}

</div>

</body>

</html>
